  #         cargo publish -p coven-runtime-spec
  #         cargo publish -p coven-runtime-registry
  #         cargo publish -p coven-runtime-cli
  #       env:
  #         CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
