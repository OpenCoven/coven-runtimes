name: Release

# Publish the canonical registry index (the accepted-runtime list) as a
# checksummed release asset so any-language consumers can pin + verify it.
# Rust consumers get the same bytes embedded in `coven-runtime-registry`.
on:
  push:
    tags: ['v*']

permissions:
  contents: write # create the release and upload assets

jobs:
  registry-index:
    name: Publish canonical registry index
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      # A release must never ship a stale index: fail if the committed
      # canonical index has drifted from its source manifests.
      - name: Verify canonical index is in sync
        run: cargo run -p coven-runtime-cli -- registry check

      - name: Stage checksummed asset
        run: |
          mkdir -p dist
          cp crates/coven-runtime-registry/canonical/index.json dist/registry-index.json
          sha256sum dist/registry-index.json | awk '{print $1}' > dist/registry-index.json.sha256

      # Uses the preinstalled `gh` CLI + the job token — no third-party action to
      # trust or commit-pin (same posture as the cargo-deny gate in ci.yml).
      - name: Attach asset to the release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF_NAME}"
          gh release view "$tag" >/dev/null 2>&1 \
            || gh release create "$tag" --title "$tag" --generate-notes
          gh release upload "$tag" \
            dist/registry-index.json \
            dist/registry-index.json.sha256 \
            --clobber

  # Optional: publish the SDK crates to crates.io on tag. Left disabled by
  # default — enable by adding a CARGO_REGISTRY_TOKEN secret and flipping `if`.
  # crates-io:
  #   name: Publish crates to crates.io
  #   if: false
  #   runs-on: ubuntu-latest
  #   steps:
  #     - uses: actions/checkout@v4
  #     - uses: dtolnay/rust-toolchain@stable
